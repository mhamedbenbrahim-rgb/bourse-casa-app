name: Mise à jour quotidienne OHLC

on:
  schedule:
    # Tous les jours à 19h00 UTC (20h/21h heure marocaine, après la clôture)
    - cron: "0 19 * * 1-5"
  workflow_dispatch:      # permet aussi le lancement manuel depuis GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install casabourse pandas

      - name: Exécuter la collecte
        run: python update_ohlc.py

      - name: Committer la base mise à jour
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add financials_cse.db
          git diff --cached --quiet || git commit -m "MAJ cours OHLC $(date +'%Y-%m-%d')"
          git push
